spring.application.name=raizes-do-nordeste

info.app.name=Raizes do Nordeste API
info.app.description=API REST MVP - franquia Raizes do Nordeste
info.app.version=0.0.1-SNAPSHOT

spring.datasource.url=jdbc:mysql://localhost:3306/raizes_db?createDatabaseIfNotExist=true&serverTimezone=America/Sao_Paulo
spring.datasource.username=root
spring.datasource.password=root

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect

spring.threads.virtual.enabled=true

jwt.secret=raizes-do-nordeste-jwt-secret-key-minimo-32-chars
jwt.expiration-ms=86400000

springdoc.swagger-ui.path=/swagger-ui.html

# Actuator — disponibilidade e metricas (RNF)
management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=when-authorized
management.endpoint.health.probes.enabled=true
management.health.livenessState.enabled=true
management.health.readinessState.enabled=true

# Resilience4j — tolerancia a falhas no gateway mock de pagamento
resilience4j.retry.instances.pagamentoGateway.max-attempts=3
resilience4j.retry.instances.pagamentoGateway.wait-duration=300ms
resilience4j.retry.instances.pagamentoGateway.retry-exceptions[0]=com.raizesdonordeste.api.exception.PagamentoGatewayIndisponivelException

resilience4j.circuitbreaker.instances.pagamentoGateway.sliding-window-size=10
resilience4j.circuitbreaker.instances.pagamentoGateway.failure-rate-threshold=50
resilience4j.circuitbreaker.instances.pagamentoGateway.wait-duration-in-open-state=15s
resilience4j.circuitbreaker.instances.pagamentoGateway.permitted-number-of-calls-in-half-open-state=3

# Gateway mock (desligado em producao; use true apenas para demonstrar retry)
pagamento.gateway.latencia-ms=50
pagamento.gateway.simular-falha-transitoria=false
pagamento.gateway.falhas-transitorias-antes-sucesso=2
